{% extends "base.html" %}

{% block title %}Prijava | Adria Clean{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 700px; margin: 2rem auto; padding: 0 1rem;">
    <h1 class="page-title">Prijava</h1>
    <p class="page-subtitle">Prijavi se u svoj Adria Clean račun.</p>

    <section class="listing-card" style="padding: 3rem; margin-top: 2rem;">
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required style="padding: 1rem; font-size: 1rem;">
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="password">Lozinka</label>
                <input type="password" id="password" name="password" required style="padding: 1rem; font-size: 1rem;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                Prijavi se
            </button>
        </form>
    </section>
</div>
{% endblock %}
