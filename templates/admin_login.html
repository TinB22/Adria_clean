{% extends "base.html" %}

{% block title %}Admin prijava | Adria Clean{% endblock %}

{% block content %}
<h1 class="page-title">Admin prijava</h1>
<p class="page-subtitle">Prijavi se za pristup admin panelu.</p>

<section class="form-card">
    <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="form-group">
            <label for="username">Korisničko ime</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">Lozinka</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="actions-row">
            <button type="submit" class="btn">Prijavi se</button>
            <a href="{{ url_for('home') }}" class="btn btn-secondary">Natrag</a>
        </div>
    </form>
</section>
{% endblock %}
