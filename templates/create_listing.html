{% extends "base.html" %}

{% block title %}Objavi oglas | Adria Clean{% endblock %}

{% block content %}
<h1 class="page-title">Objavi oglas</h1>
<p class="page-subtitle">Ispuni podatke i objavi svoj oglas na platformi.</p>

<section class="form-card">
    <form method="POST" action="{{ url_for('create_listing') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Naslov oglasa</label>
            <input type="text" id="title" name="title" required>
        </div>

        <div class="form-group">
            <label for="description">Opis</label>
            <textarea id="description" name="description" required></textarea>
        </div>

        <div class="form-group">
            <label for="user_type">Vrsta korisnika</label>
            <select id="user_type" name="user_type" required>
                <option value="">-- Odaberi --</option>
                <option value="owner">Vlasnik apartmana / vile</option>
                <option value="cleaner">Čistač / pružatelj usluge</option>
            </select>
        </div>

        <div class="form-group">
            <label for="location">Lokacija</label>
            <input type="text" id="location" name="location" required>
        </div>

        <div class="form-group">
            <label for="contact">Kontakt</label>
            <input type="text" id="contact" name="contact" required>
        </div>

        <button type="submit" class="btn">Objavi oglas</button>
    </form>
</section>
{% endblock %}
